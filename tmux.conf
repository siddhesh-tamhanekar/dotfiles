# ================================================================
# SENIOR GO ENGINEER TMUX CONFIG (SUBTLE & ERGONOMIC)
# ================================================================

# --- Core Invariants ---
set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-256color:RGB"
set -sg escape-time 10
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1

# --- Strict Ergonomics ---
set -g mouse on
unbind -n MouseDown1Pane
unbind -n MouseDown1Status
unbind Left
unbind Right
unbind Up
unbind Down

# --- Navigation & Resizing (Home Row) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Structural Movement ---
bind J join-pane -h -s !
bind V join-pane -v -s !
bind ! break-pane

# --- Layouts & Maintenance ---
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"
bind , command-prompt "rename-window '%%'"
bind -r Space next-layout

# --- Subtle Visual State ---
set -g status-style bg=default,fg=colour245
set -g status-left "#S "
set -g status-left-style fg=blue,bold
set -g status-right "%d %b %I:%M %p"
set -g status-right-style fg=colour245

setw -g window-status-current-style fg=cyan,bold
setw -g window-status-style fg=colour239
